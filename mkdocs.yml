site_name: Laravel Smarty
site_description: Replace Blade with Smarty as the default Laravel template engine.
site_url: https://vusys.github.io/laravel-smarty/
repo_url: https://github.com/Vusys/laravel-smarty
repo_name: Vusys/laravel-smarty
edit_uri: edit/master/docs/

docs_dir: docs

validation:
  nav:
    omitted_files: info

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Fira Sans
    code: Fira Code
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
      extend_pygments_lang:
        - name: php
          lang: php
          options:
            startinline: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

extra_css:
  - stylesheets/codehilite.css

nav:
  - Home: index.md
  - Overview: overview.md
  - Quick start: quick-start.md
  - Configuration: configuration.md
  - Laravel integration: laravel-integration.md
  - Built-in plugins: plugins.md
  - Pagination: pagination.md
  - Wrapper objects: wrapper-objects.md
  - Artisan commands: artisan.md
  - Custom plugins: custom-plugins.md
  - Security: security.md
  - Troubleshooting: troubleshooting.md
  - Development: development.md

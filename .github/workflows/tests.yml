name: Tests

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - { laravel: '10.0', testbench: '8.0', php: '8.1' }
          - { laravel: '10.0', testbench: '8.0', php: '8.2' }
          - { laravel: '10.0', testbench: '8.0', php: '8.3' }
          - { laravel: '11.0', testbench: '9.0', php: '8.3' }
          - { laravel: '11.0', testbench: '9.0', php: '8.4' }
          - { laravel: '11.0', testbench: '9.0', php: '8.5' }
          - { laravel: '12.0', testbench: '10.0', php: '8.3' }
          - { laravel: '12.0', testbench: '10.0', php: '8.4' }
          - { laravel: '12.0', testbench: '10.0', php: '8.5' }
          - { laravel: '13.0', testbench: '11.0', php: '8.3' }
          - { laravel: '13.0', testbench: '11.0', php: '8.4' }
          - { laravel: '13.0', testbench: '11.0', php: '8.5' }

    name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, dom, fileinfo, intl
          coverage: none
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: composer-php${{ matrix.php }}-laravel${{ matrix.laravel }}-${{ hashFiles('composer.json') }}
          restore-keys: |
            composer-php${{ matrix.php }}-laravel${{ matrix.laravel }}-

      - name: Pin matrix versions
        run: composer require --dev --no-update "laravel/framework:^${{ matrix.laravel }}" "orchestra/testbench:^${{ matrix.testbench }}"

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Run tests
        run: vendor/bin/phpunit

  static-analysis:
    runs-on: ubuntu-latest
    name: Static analysis & code style

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, dom, fileinfo, intl
          coverage: none
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: composer-static-analysis-${{ hashFiles('composer.json') }}
          restore-keys: |
            composer-static-analysis-

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Run Larastan
        run: vendor/bin/phpstan analyse --no-progress --error-format=github

      - name: Run Rector (dry-run)
        run: vendor/bin/rector process --dry-run --no-progress-bar

      - name: Run Pint (test mode)
        run: vendor/bin/pint --test

name: Tests

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

# Stacked pushes to the same branch supersede in-flight matrix runs.
concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - { laravel: '10.0', testbench: '8.0', php: '8.1' }
          - { laravel: '10.0', testbench: '8.0', php: '8.2' }
          - { laravel: '10.0', testbench: '8.0', php: '8.3' }
          # PHP floors: Laravel 11 and 12 both support PHP 8.2 — without
          # these rows the claimed floor was never tested.
          - { laravel: '11.0', testbench: '9.0', php: '8.2' }
          - { laravel: '11.0', testbench: '9.0', php: '8.3' }
          - { laravel: '11.0', testbench: '9.0', php: '8.4' }
          - { laravel: '11.0', testbench: '9.0', php: '8.5' }
          - { laravel: '12.0', testbench: '10.0', php: '8.2' }
          - { laravel: '12.0', testbench: '10.0', php: '8.3' }
          - { laravel: '12.0', testbench: '10.0', php: '8.4' }
          - { laravel: '12.0', testbench: '10.0', php: '8.5' }
          - { laravel: '13.0', testbench: '11.0', php: '8.3' }
          - { laravel: '13.0', testbench: '11.0', php: '8.4', coverage: true }
          - { laravel: '13.0', testbench: '11.0', php: '8.5' }
          # Dependency-floor canaries. `lowest` resolves the oldest
          # dependency set composer.json permits — catching floors that
          # have silently rotted below what the code actually needs. The
          # smarty pin holds the minimum supported Smarty minor: the
          # package reflects into Smarty internals (BridgedSmarty injects
          # the compiler), so both directions of upstream drift deserve a
          # cell.
          # testbench floor is 8.1 (not 8.0): testbench-core 8.0.x ships a
          # skeleton with a non-null app.asset_url default, which points
          # asset() at "/" instead of the request root. phpunit's floor is
          # 10.5.32 — the first 10.x whose XML schema knows
          # displayDetailsOnPhpunitDeprecations (failOnWarning turns the
          # validation warning into a failure).
          - { laravel: '10.0', testbench: '8.1', php: '8.1', stability: 'lowest' }
          - { laravel: '13.0', testbench: '11.0', php: '8.4', smarty: '5.4.*' }

    name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}${{ matrix.stability == 'lowest' && ' (lowest deps)' || '' }}${{ matrix.smarty && format(' (smarty {0})', matrix.smarty) || '' }}

    steps:
      - uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, dom, fileinfo, intl
          coverage: ${{ matrix.coverage && 'pcov' || 'none' }}
          tools: composer:v2

      - name: Determine composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v6
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-php${{ matrix.php }}-laravel${{ matrix.laravel }}-${{ hashFiles('composer.json') }}
          restore-keys: |
            composer-php${{ matrix.php }}-laravel${{ matrix.laravel }}-

      - name: Allow installation of advisory-affected Laravel versions
        # Composer's solver refuses to load packages with open security
        # advisories. Older Laravel branches (10.x, 11.x ≤ 11.54) currently
        # have advisories against every available version, so the matrix
        # can't resolve at all. CI only — the published composer.json is
        # untouched and end users still see the warnings.
        run: composer config audit.block-insecure false

      - name: Pin matrix versions
        run: |
          composer remove --dev --no-update larastan/larastan rector/rector driftingly/rector-laravel laravel/pint infection/infection
          composer require --dev --no-update "laravel/framework:^${{ matrix.laravel }}" "orchestra/testbench:^${{ matrix.testbench }}"

      - name: Pin Smarty version
        if: matrix.smarty
        run: composer require --no-update "smarty/smarty:${{ matrix.smarty }}"

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress ${{ matrix.stability == 'lowest' && '--prefer-lowest --prefer-stable' || '' }}

      - name: Run tests
        run: vendor/bin/phpunit ${{ matrix.coverage && '--coverage-clover=coverage.xml' || '' }}

      - name: Upload coverage to Codecov
        if: matrix.coverage
        uses: codecov/codecov-action@v7
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  static-analysis:
    runs-on: ubuntu-latest
    name: Static analysis & code style

    steps:
      - uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, dom, fileinfo, intl
          coverage: none
          tools: composer:v2

      - name: Determine composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v6
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-static-analysis-${{ hashFiles('composer.json') }}
          restore-keys: |
            composer-static-analysis-

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Run Larastan
        run: vendor/bin/phpstan analyse --no-progress --error-format=github

      - name: Run Rector (dry-run)
        run: vendor/bin/rector process --dry-run --no-progress-bar

      - name: Run Pint (test mode)
        run: vendor/bin/pint --test

  # Single stable check name for branch protection: requiring this one
  # job keeps protection valid as matrix cells come and go, instead of
  # enumerating every "PHP x / Laravel y" check by hand. `if: always()`
  # + explicit result checks, because a plain `needs:` job is *skipped*
  # (not failed) when a dependency fails — and GitHub treats a skipped
  # required check as passing.
  tests-passed:
    name: Tests passed
    if: always()
    needs: [test, static-analysis]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all jobs succeeded
        run: |
          if [ "${{ needs.test.result }}" != "success" ] || [ "${{ needs.static-analysis.result }}" != "success" ]; then
            echo "test=${{ needs.test.result }} static-analysis=${{ needs.static-analysis.result }}"
            exit 1
          fi
